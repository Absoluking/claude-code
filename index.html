<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 智能问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
        }

        .status-dot.error {
            background: #ef4444;
        }

        .status-dot.loading {
            background: #fbbf24;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab:hover {
            background: #e9e9e9;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-icon {
            font-size: 64px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9rem;
        }

        .file-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-info h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .file-info p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-top: 20px;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.ai {
            align-self: flex-start;
            background: #f5f5f5;
            color: #333;
            border-bottom-left-radius: 5px;
        }

        .message.system {
            align-self: center;
            background: #e9ecef;
            color: #666;
            font-size: 0.9rem;
            padding: 8px 15px;
        }

        .message strong {
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
        }

        .chat-input-area {
            border-top: 1px solid #ddd;
            padding: 20px;
            background: white;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .chat-input:disabled {
            background: #f5f5f5;
        }

        .send-btn {
            padding: 0 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .chat-messages::-webkit-scrollbar,
        .tab-content::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track,
        .tab-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-messages::-webkit-scrollbar-thumb,
        .tab-content::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .message {
                max-width: 90%;
            }

            .send-btn {
                padding: 0 15px;
                font-size: 1rem;
            }

            .btn {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 RAG 智能问答系统</h1>
            <p>基于向量数据库的上下文感知问答</p>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">服务就绪</span>
            </div>
        </div>

        <div class="main-content">
            <div class="tabs">
                <div class="tab active" data-tab="upload">📄 文件上传</div>
                <div class="tab" data-tab="chat">💬 智能问答</div>
            </div>

            <div class="tab-content">
                <div id="uploadTab" class="tab-panel active">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📁</div>
                        <div class="upload-text">点击选择文件或拖拽文件到此处</div>
                        <div class="upload-hint">支持 .txt, .md, .pdf 文件格式</div>
                        <input type="file" id="fileInput" accept=".txt,.md,.pdf" style="display: none;">
                    </div>

                    <div class="file-info" id="fileInfo">
                        <h3>✅ 文件已上传</h3>
                        <p id="fileContent"></p>
                    </div>

                    <button class="btn btn-primary" id="uploadBtn" disabled>开始处理</button>
                </div>

                <div id="chatTab" class="tab-panel">
                    <div class="chat-container">
                        <div class="chat-messages" id="chatMessages">
                            <div class="message system">
                                欢迎使用 RAG 智能问答系统！
                            </div>
                            <div class="message system">
                                请先在"文件上传"标签页上传文档，然后在"智能问答"标签页进行提问。
                            </div>
                        </div>

                        <div class="chat-input-area">
                            <div class="input-wrapper">
                                <input type="text" class="chat-input" id="chatInput" placeholder="输入你的问题..." disabled>
                                <button class="send-btn" id="sendBtn" disabled>
                                    <span id="sendBtnText">➤</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileContent = document.getElementById('fileContent');
        const uploadBtn = document.getElementById('uploadBtn');
        const chatTab = document.getElementById('chatTab');
        const uploadTab = document.getElementById('uploadTab');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const sendBtnText = document.getElementById('sendBtnText');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let currentFile = null;
        let chunksCount = 0;
        let uploadedFiles = new Set();

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Tab').classList.add('active');
                if (tab.dataset.tab === 'chat') {
                    chatInput.focus();
                }
            });
        });

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const allowedExtensions = ['.txt', '.md', '.pdf'];
            const fileExt = '.' + file.name.split('.').pop().toLowerCase();

            if (!allowedExtensions.includes(fileExt)) {
                addSystemMessage('❌ 不支持的文件格式。请上传 .txt, .md 或 .pdf 文件。');
                return;
            }

            currentFile = file;
            fileContent.textContent = `文件名: ${file.name}\n大小: ${(file.size / 1024).toFixed(2)} KB\n类型: ${file.type || '未知'}\n上传时间: ${new Date().toLocaleTimeString()}`;
            fileInfo.classList.add('show', 'upload-success');
            uploadBtn.disabled = false;

            uploadedFiles.add(file.name);
            statusText.textContent = `${uploadedFiles.size} 个文件已上传`;
        }

        uploadBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            uploadBtn.disabled = true;
            uploadBtn.textContent = '⏳ 上传中...';

            try {
                const formData = new FormData();
                formData.append('file', currentFile);

                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();
                chunksCount = result.chunks_count;
                uploadBtn.textContent = `✅ 上传成功 (${chunksCount} 块)`;

                addSystemMessage(`📄 文件 "${currentFile.name}" 上传成功！`);
                addSystemMessage(`📊 已创建 ${chunksCount} 个文本块，可用于问答。`);
                addSystemMessage(`💡 提示：现在可以切换到"智能问答"标签进行提问了。`);

                statusText.textContent = `已上传 ${uploadedFiles.size} 个文件 (${chunksCount} 块)`;

                setTimeout(() => {
                    uploadBtn.textContent = '重新上传';
                    uploadBtn.disabled = false;
                }, 3000);

            } catch (error) {
                console.error('Upload error:', error);
                addSystemMessage(`❌ 上传失败: ${error.message}`);
                uploadBtn.textContent = '重试上传';
                uploadBtn.disabled = false;
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !chatInput.disabled) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const question = chatInput.value.trim();
            if (!question) return;

            chatInput.value = '';

            addMessage(question, 'user');

            sendBtn.disabled = true;
            sendBtnText.textContent = '⏳';

            try {
                const response = await fetch(`${API_BASE}/ask`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();
                addMessage(result.answer || '无法生成答案', 'ai');

                if (result.model) {
                    addSystemMessage(`🤖 使用模型: ${result.model}`);
                }

            } catch (error) {
                console.error('Ask error:', error);
                addMessage(`❌ 请求失败: ${error.message}\n💡 提示：请确保服务器正在运行，并且文档已上传。`, 'ai');
            } finally {
                sendBtn.disabled = false;
                sendBtnText.textContent = '➤';
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            if (type === 'user') {
                messageDiv.innerHTML = text;
            } else if (type === 'ai') {
                const formattedText = text
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/- (.*?)<br>/g, '• $1<br>');

                messageDiv.innerHTML = formattedText;
            }

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addSystemMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message system';
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    statusDot.classList.remove('error');
                    statusText.textContent = '服务运行中';
                    statusText.style.color = 'white';

                    if (uploadedFiles.size > 0) {
                        chatInput.disabled = false;
                        sendBtn.disabled = false;
                        addSystemMessage('✅ 服务器连接正常，可以开始使用！');
                    }
                } else {
                    throw new Error('Server not responding');
                }
            } catch (error) {
                console.error('Health check failed:', error);
                statusDot.classList.add('error');
                statusText.textContent = '服务未连接';
                statusText.style.color = 'white';
                addSystemMessage('⚠️ 服务器未连接，请确保 main.py 正在运行。');
            }
        }

        checkHealth();

        setTimeout(() => {
            if (uploadedFiles.size === 0) {
                addSystemMessage('👋 欢迎使用 RAG 智能问答系统！');
                addSystemMessage('📋 请先上传文档，然后进行问答。');
            }
        }, 500);
    </script>
</body>
</html>
